<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OkiStrue</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #111;
    }
    .wrap {
      max-width: 860px;
      margin: 60px auto;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 32px;
      box-shadow: 0 4px 18px rgba(0,0,0,.04);
    }
    h1 {
      margin-top: 0;
      font-size: 2rem;
      line-height: 1.2;
    }
    p {
      color: #444;
      line-height: 1.6;
    }
    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid #dcdcdc;
      background: #fff;
      color: #111;
    }
    .btn.primary {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    .footer {
      margin-top: 24px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>OkiStrue</h1>
      <p>
        Benvenuto nella pagina ufficiale di OkiStrue.
        Qui trovi i documenti legali e le pagine pubbliche del progetto.
      </p>

      <div class="links">
        <a class="btn primary" href="./privacy.html">Privacy Policy</a>
        <a class="btn" href="./terms.html">Termini e Condizioni</a>
      </div>

      <p class="footer">
        Contatto: <a href="mailto:info@okistrue.com">info@okistrue.com</a>
      </p>
    </div>
  </div>
</body>
</html>
